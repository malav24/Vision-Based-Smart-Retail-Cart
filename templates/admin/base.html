<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Dropbox Admin</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap');
        :root {
            --bg-color: #f8fafc;
            --surface-color: #ffffff;
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --text-dark: #0f172a;
            --text-muted: #64748b;
            --border-color: #e2e8f0;
        }
        body { margin: 0; font-family: 'Outfit', sans-serif; background: var(--bg-color); color: var(--text-dark); }
        .sidebar { width: 250px; height: 100vh; position: fixed; background: var(--surface-color); padding: 25px 20px; box-shadow: 2px 0 15px rgba(15, 23, 42, 0.05); border-right: 1px solid var(--border-color); z-index: 100; box-sizing: border-box; }
        .sidebar h2 { color: var(--text-dark); font-weight: 700; margin-bottom: 30px; margin-top: 0; font-size: 24px; padding-left: 10px;}
        .sidebar h2 span { color: var(--primary); }
        .sidebar a { display: block; color: var(--text-muted); text-decoration: none; padding: 12px 16px; margin-bottom: 8px; border-radius: 10px; transition: all 0.3s; font-weight: 500; }
        .sidebar a:hover, .sidebar a.active { background: #e0e7ff; color: var(--primary); transform: translateX(5px); }
        .main-content { margin-left: 250px; padding: 50px; background-image: radial-gradient(circle at top right, #e0e7ff 0%, transparent 30%); min-height: 100vh;}
        .card { background: var(--surface-color); border-radius: 20px; padding: 25px; box-shadow: 0 10px 25px rgba(15, 23, 42, 0.03); border: 1px solid var(--border-color); margin-bottom: 25px; }
        .card h3 { margin-top: 0; color: var(--text-dark); font-weight: 600; }
        .btn { background: var(--primary); color: white; border: none; padding: 12px 24px; border-radius: 10px; cursor: pointer; transition: 0.3s; font-weight: 600; font-family: 'Outfit', sans-serif;}
        .btn:hover { background: var(--primary-hover); transform: translateY(-2px); box-shadow: 0 5px 15px rgba(79, 70, 229, 0.3); }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: white; border-radius: 12px; overflow: hidden;}
        th, td { text-align: left; padding: 15px; border-bottom: 1px solid var(--border-color); }
        th { color: var(--text-muted); font-weight: 600; background: #f8fafc; font-size: 14px; text-transform: uppercase; letter-spacing: 0.5px;}
        tr:last-child td { border-bottom: none; }
        tr:hover td { background-color: #f1f5f9; }
        input { font-family: 'Outfit', sans-serif; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2>Admin <span>Panel</span></h2>
        <a href="/" style="margin-bottom: 25px;"><span style="font-size: 14px;">← Back to Landing</span></a>
        
        <a href="/admin/dashboard" class="{% if request.path == '/admin/dashboard' %}active{% endif %}">Dashboard</a>
        <a href="/admin/products" class="{% if request.path == '/admin/products' %}active{% endif %}">Products</a>
        <a href="/admin/training" class="{% if request.path == '/admin/training' %}active{% endif %}">CV Training</a>
        <br><br>
        <a href="/admin/logout">Logout</a>
    </div>
    <div class="main-content">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
