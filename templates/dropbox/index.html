<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Dropbox Kiosk</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap');
        :root {
            --bg: #f8fafc;
            --surface: #ffffff;
            --accent: #4f46e5;
            --accent-hover: #4338ca;
            --success: #10b981;
            --success-light: #dcfce7;
            --danger: #ef4444;
            --text: #0f172a;
            --text-muted: #64748b;
            --border: #e2e8f0;
        }
        body { font-family: 'Outfit', sans-serif; background: var(--bg); background-image: radial-gradient(circle at top right, #e0e7ff 0%, transparent 40%), radial-gradient(circle at bottom left, #e0f2fe 0%, transparent 40%); color: var(--text); margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        .vision-panel { flex: 2; padding: 50px; display: flex; flex-direction: column; position: relative; }
        .vision-container { flex: 1; background: #f1f5f9; border-radius: 30px; overflow: hidden; position: relative; display: flex; justify-content: center; align-items: center; box-shadow: 0 20px 50px rgba(15,23,42,0.08); border: 2px dashed #cbd5e1; }
        .camera-feed { width: 100%; height: 100%; object-fit: cover; opacity: 1; }
        .scan-line { position: absolute; width: 100%; height: 6px; background: rgba(79, 70, 229, 0.4); box-shadow: 0 0 20px rgba(79,70,229,0.8); top: 0; animation: scan 3s infinite linear; }
        @keyframes scan { 0% { top: 0; } 50% { top: 100%; } 100% { top: 0; } }
        
        .status-overlay { position: absolute; top: 25px; left: 25px; background: rgba(255,255,255,0.9); backdrop-filter: blur(10px); padding: 12px 24px; border-radius: 30px; border: 1px solid var(--border); display: flex; align-items: center; gap: 12px; font-weight: 600; color: var(--text); box-shadow: 0 5px 15px rgba(0,0,0,0.05);}
        .status-dot { width: 12px; height: 12px; background: var(--success); border-radius: 50%; box-shadow: 0 0 10px var(--success); animation: pulse 2s infinite; }
        @keyframes pulse { 0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.4); } 70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(16, 185, 129, 0); } 100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); } }
        
        .cart-panel { flex: 1.2; background: var(--surface); padding: 50px 40px; display: flex; flex-direction: column; box-shadow: -10px 0 30px rgba(15,23,42,0.05); z-index: 10;}
        .cart-panel h2 { margin-top: 0; font-size: 32px; font-weight: 700; margin-bottom: 40px; display: flex; align-items: center; gap: 15px; color: var(--text); }
        .cart-items { flex: 1; overflow-y: auto; padding-right: 15px; }
        .cart-item { background: #f8fafc; border: 1px solid var(--border); border-radius: 16px; padding: 20px 25px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; transition: all 0.3s; animation: slideIn 0.4s cubic-bezier(0.16, 1, 0.3, 1); box-shadow: 0 4px 6px rgba(15,23,42,0.02);}
        @keyframes slideIn { from { opacity: 0; transform: translateX(30px); } to { opacity: 1; transform: translateX(0); } }
        .item-info h4 { margin: 0 0 8px 0; font-size: 18px; font-weight: 600; color: var(--text);}
        .item-info p { margin: 0; color: var(--text-muted); font-size: 15px; font-weight: 500;}
        .item-price { font-weight: 700; color: var(--text); font-size: 20px; }
        
        .cart-summary { background: #f8fafc; padding: 30px; border-radius: 20px; margin-top: 25px; border: 1px solid var(--border); }
        .total-row { display: flex; justify-content: space-between; align-items: center; font-size: 24px; font-weight: 700; margin-bottom: 25px; color: var(--text); }
        .total-row span:last-child { font-size: 36px; color: var(--accent); }
        
        .btn { width: 100%; padding: 20px; border: none; border-radius: 16px; font-size: 18px; font-weight: 600; cursor: pointer; transition: 0.3s; font-family: 'Outfit', sans-serif; }
        .btn-primary { background: linear-gradient(135deg, var(--accent) 0%, #6366f1 100%); color: white; box-shadow: 0 10px 25px rgba(79,70,229,0.25); }
        .btn-primary:hover { transform: translateY(-3px); box-shadow: 0 15px 30px rgba(79,70,229,0.35); }
        .btn-secondary { background: white; border: 2px solid var(--border); color: var(--text-muted); margin-top: 15px; }
        .btn-secondary:hover { background: #f8fafc; color: var(--text); border-color: #cbd5e1; }

        .toast { position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%) translateY(100px); background: #ffffff; color: var(--text); padding: 18px 35px; border-radius: 50px; box-shadow: 0 15px 35px rgba(15,23,42,0.1); opacity: 0; transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1); z-index: 1000; font-weight: 600; border: 1px solid var(--border); font-size: 16px; display: flex; align-items: center; gap: 10px;}
        .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
        .toast.error { border-left: 5px solid var(--danger); }
        .toast.success { border-left: 5px solid var(--success); }
        
        .file-upload-btn { position: absolute; bottom: 30px; right: 30px; background: rgba(255,255,255,0.9); backdrop-filter: blur(10px); border: 1px solid var(--border); color: var(--text); padding: 12px 24px; border-radius: 12px; cursor: pointer; font-family: 'Outfit', sans-serif; font-weight: 600; z-index: 10; transition: 0.3s; box-shadow: 0 10px 20px rgba(15,23,42,0.05); }
        .file-upload-btn:hover { background: #ffffff; transform: translateY(-2px); box-shadow: 0 15px 25px rgba(15,23,42,0.1); }
        
        .mobile-camera-link { display: inline-block; text-decoration: none; color: #ffffff; background: linear-gradient(135deg, var(--accent) 0%, #6366f1 100%); padding: 12px 24px; border-radius: 10px; font-weight: 600; transition: 0.3s; box-shadow: 0 10px 25px rgba(79,70,229,0.25); margin-left: 15px; }
        .mobile-camera-link:hover { transform: translateY(-2px); box-shadow: 0 15px 30px rgba(79,70,229,0.35); }
    </style>
</head>
<body>
    <div class="vision-panel">
        <div style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 40px;">
            <div>
                <h1 style="margin: 0 0 10px 0; font-weight: 300; font-size: 42px;">Smart <span style="font-weight: 700; color: var(--accent);">Dropbox</span></h1>
                <p style="color: var(--text-muted); margin: 0; font-size: 18px;">Place your items in the box. Our AI will automatically detect and bill them.</p>
            </div>
            <div style="display: flex; gap: 10px;">
                <a href="/mobile/camera" class="mobile-camera-link">📱 iPhone Camera</a>
                <a href="/" style="text-decoration: none; color: var(--text-muted); font-weight: 600; padding: 10px 20px; border-radius: 10px; background: white; border: 1px solid var(--border); transition: 0.3s;">Exit Session</a>
            </div>
        </div>
        
        <div class="vision-container">
            <div class="scan-line" id="scan-line"></div>
            <video id="webcam" class="camera-feed" autoplay playsinline></video>
            <canvas id="canvas" style="display:none;"></canvas>
            
            <div class="status-overlay">
                <div class="status-dot"></div>
                <span>Vision System Active</span>
            </div>
            
            <!-- Fallback for image upload testing -->
            <label class="file-upload-btn">
                📸 Simulate Detection
                <input type="file" id="imageInput" style="display: none;" accept="image/*">
            </label>
        </div>
    </div>
    
    <div class="cart-panel">
        <h2>🛍️ Current Cart</h2>
        
        <div class="cart-items" id="cart-container">
            <div style="text-align: center; color: var(--text-muted); margin-top: 100px;">
                <div style="font-size: 48px; margin-bottom: 20px; opacity: 0.5;">🛒</div>
                <div style="font-size: 20px; font-weight: 500;">Cart is empty.</div>
                <div style="margin-top: 10px;">Place an item in the dropbox to begin.</div>
            </div>
        </div>
        
        <div class="cart-summary">
            <div class="total-row">
                <span>Total Amount</span>
                <span id="cart-total">₹0.00</span>
            </div>
            <button class="btn btn-primary" onclick="checkout()">Confirm & Generate Bill</button>
            <button class="btn btn-secondary" onclick="clearCart()">Clear Cart</button>
        </div>
    </div>

    <div id="toast" class="toast">Message</div>

    <script>
        // Setup webcam
        const video = document.getElementById('webcam');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const scanLine = document.getElementById('scan-line');

        async function setupCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                video.srcObject = stream;
            } catch (err) {
                console.error("Camera access denied", err);
                showToast("Camera not available. Please use image upload.", "error");
            }
        }

        function showToast(message, type="success") {
            const toast = document.getElementById('toast');
            const icon = type === "success" ? "✅" : "⚠️";
            toast.innerHTML = `<span>${icon}</span> ${message}`;
            toast.className = `toast show ${type}`;
            setTimeout(() => { toast.classList.remove('show'); }, 3000);
        }

        let cart = [];
        
        function updateCartUI() {
            const container = document.getElementById('cart-container');
            const totalEl = document.getElementById('cart-total');
            
            if (cart.length === 0) {
                container.innerHTML = `
                <div style="text-align: center; color: var(--text-muted); margin-top: 100px;">
                    <div style="font-size: 48px; margin-bottom: 20px; opacity: 0.5;">🛒</div>
                    <div style="font-size: 20px; font-weight: 500;">Cart is empty.</div>
                    <div style="margin-top: 10px;">Place an item in the dropbox to begin.</div>
                </div>`;
                totalEl.textContent = '$0.00';
                return;
            }
            
            let html = '';
            let total = 0;
            cart.forEach(item => {
                total += item.price;
                html += `
                    <div class="cart-item">
                        <div class="item-info">
                            <h4>${item.name}</h4>
                            <p>Qty: 1</p>
                        </div>
                        <div class="item-price">$${item.price.toFixed(2)}</div>
                    </div>
                `;
            });
            container.innerHTML = html;
            totalEl.textContent = `$${total.toFixed(2)}`;
        }

        // Image upload simulation
        document.getElementById('imageInput').addEventListener('change', async (e) => {
            if(!e.target.files[0]) return;
            const file = e.target.files[0];
            const formData = new FormData();
            formData.append('image', file);
            
            scanLine.style.animationDuration = "0.5s";
            
            try {
                const res = await fetch('/api/dropbox/infer', { method: 'POST', body: formData });
                const data = await res.json();
                
                scanLine.style.animationDuration = "3s";
                
                if(data.success && data.items && data.items.length > 0) {
                    data.items.forEach(i => {
                        cart.push({id: i.product_id, name: i.product_name, price: i.price});
                    });
                    updateCartUI();
                    showToast(`${data.items.length} item(s) added!`, "success");
                } else if(data.error) {
                    showToast(data.error, "error");
                } else {
                    showToast("No recognized products detected in catalog.", "error");
                }
            } catch(err) {
                scanLine.style.animationDuration = "3s";
                showToast("Connection Error", "error");
            }
        });

        async function clearCart() {
            cart = [];
            updateCartUI();
        }

        async function checkout() {
            if(cart.length === 0) {
                showToast("Cart is empty!", "error");
                return;
            }
            try {
                const res = await fetch('/api/dropbox/checkout', { 
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({cart: cart})
                });
                const data = await res.json();
                if(data.success) {
                    alert(`✅ Payment Successful!\nTotal: $${data.total.toFixed(2)}\nThank you for shopping!`);
                    cart = [];
                    updateCartUI();
                }
            } catch(e) {
                showToast("Checkout failed", "error");
            }
        }

        setupCamera();
    </script>
</body>
</html>
